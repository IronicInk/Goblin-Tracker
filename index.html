<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0702">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MythicalTrack">
  <meta name="description" content="Fantasy card game token and goblin tracker">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>MythicalTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-logo">
      <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="46" height="46" aria-label="MythicalTrack logo">
        <defs>
          <radialGradient id="logoBg" cx="50%" cy="38%" r="62%">
            <stop offset="0%" stop-color="#3d200a"/>
            <stop offset="100%" stop-color="#110802"/>
          </radialGradient>
          <linearGradient id="logoRing" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe080"/>
            <stop offset="45%" stop-color="#c9a84c"/>
            <stop offset="100%" stop-color="#7a5210"/>
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="48" fill="url(#logoBg)"/>
        <circle cx="50" cy="50" r="46.5" fill="none" stroke="url(#logoRing)" stroke-width="4"/>
        <circle cx="50" cy="50" r="40" fill="none" stroke="#c9a84c" stroke-width="1.8" opacity="0.4"/>
        <circle cx="50" cy="3.5"  r="3" fill="#c9a84c"/>
        <circle cx="96.5" cy="50" r="3" fill="#c9a84c"/>
        <circle cx="50" cy="96.5" r="3" fill="#c9a84c"/>
        <circle cx="3.5" cy="50"  r="3" fill="#c9a84c"/>
        <polygon points="50,18 66,40 66,62 50,82 34,62 34,40" fill="#1a0d04" stroke="url(#logoRing)" stroke-width="2.5"/>
        <polygon points="50,18 66,40 50,50 34,40" fill="#f0d060" opacity="0.92"/>
        <polygon points="50,82 66,62 50,50 34,62" fill="#7a5010" opacity="0.92"/>
        <polygon points="34,40 50,50 34,62" fill="#b08828" opacity="0.88"/>
        <polygon points="66,40 50,50 66,62" fill="#906818" opacity="0.88"/>
        <polygon points="50,18 57,33 50,40 43,33" fill="white" opacity="0.2"/>
        <circle cx="50" cy="50" r="2.5" fill="#ffe080" opacity="0.75"/>
      </svg>
      <div class="logo-text">
        <span class="app-title">MythicalTrack</span>
        <span class="app-subtitle">Token Tracker</span>
      </div>
    </div>
    <button class="btn-reset" id="resetBtn">New Game</button>
  </header>

  <!-- KRENKO / GOBLINS -->
  <section class="section krenko-section">
    <div class="krenko-card">

      <!-- Card header: name + ability -->
      <div class="krenko-top">
        <div class="krenko-info">
          <span class="krenko-name">Goblin Mob Boss</span>
          <span class="krenko-ability">Tap: Create X 1/1 Goblin tokens (X = Goblins you control)</span>
        </div>
      </div>

      <!-- Total counter -->
      <div class="goblin-total-row">
        <span class="pool-total-label">Total Goblins</span>
        <span class="pool-total-val" id="goblinTotal">0</span>
      </div>

      <!-- Ready / Sick pools -->
      <div class="goblin-pools">
        <div class="goblin-pool">
          <span class="pool-label">⚡ Ready</span>
          <div class="stepper">
            <button class="stepper-btn" id="readyPlus">+</button>
            <span class="goblin-count" id="goblinsReady">0</span>
            <button class="stepper-btn" id="readyMinus">−</button>
          </div>
        </div>
        <div class="goblin-pool">
          <span class="pool-label">💤 Sick</span>
          <div class="stepper">
            <button class="stepper-btn" id="sickPlus">+</button>
            <span class="goblin-count" id="goblinsSick">0</span>
            <button class="stepper-btn" id="sickMinus">−</button>
          </div>
        </div>
      </div>

      <!-- Goblin Power / Toughness -->
      <div class="goblin-pt-section">
        <span class="goblin-pt-title">Goblin Power / Toughness</span>
        <div class="goblin-pt-grid">
          <div class="goblin-pool">
            <span class="pool-label">⚔ Attack</span>
            <div class="stepper">
              <button class="stepper-btn" id="goblinAtkPlus">+</button>
              <span class="goblin-stat-val" id="goblinAtk">1</span>
              <button class="stepper-btn" id="goblinAtkMinus">−</button>
            </div>
          </div>
          <span class="goblin-pt-sep">/</span>
          <div class="goblin-pool">
            <span class="pool-label">🛡 Defense</span>
            <div class="stepper">
              <button class="stepper-btn" id="goblinDefPlus">+</button>
              <span class="goblin-stat-val" id="goblinDef">1</span>
              <button class="stepper-btn" id="goblinDefMinus">−</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Action buttons row -->
      <div class="krenko-actions">
        <button class="krenko-action-btn krenko-wipe" id="boardWipeBtn">☠ Board Wipe</button>
        <button class="krenko-action-btn krenko-turn" id="newTurnBtn">↻ New Turn</button>
      </div>

      <!-- Tap Krenko -->
      <button class="tap-btn" id="tapKrenkoBtn">
        <span class="tap-btn__label">⚡ TAP KRENKO</span>
        <span class="tap-btn__hint" id="tapHint">add goblins first</span>
      </button>

    </div>
  </section>

  <!-- TOKENS -->
  <section class="section">
    <h2 class="section-title">Tokens</h2>
    <div class="tokens-grid" id="tokensGrid"></div>
    <button class="btn-add-token" id="addTokenBtn">+ Add Custom Token</button>
  </section>


</div>

<!-- ADD TOKEN MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3 class="modal-title">Add Custom Token</h3>
    <input class="modal-input" id="tokenNameInput" type="text" placeholder="Token name (e.g. Zombie)" maxlength="20" autocomplete="off">
    <div class="modal-stat-row">
      <div class="modal-stat-group">
        <label class="modal-stat-label">⚔ Attack</label>
        <div class="modal-stat-adj">
          <button class="modal-stat-btn" id="modalAtkMinus">−</button>
          <span class="modal-stat-val" id="modalAtkVal">1</span>
          <button class="modal-stat-btn" id="modalAtkPlus">+</button>
        </div>
      </div>
      <div class="modal-stat-sep">/</div>
      <div class="modal-stat-group">
        <label class="modal-stat-label">🛡 Defense</label>
        <div class="modal-stat-adj">
          <button class="modal-stat-btn" id="modalDefMinus">−</button>
          <span class="modal-stat-val" id="modalDefVal">1</span>
          <button class="modal-stat-btn" id="modalDefPlus">+</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-modal--cancel" id="addModalCancel">Cancel</button>
      <button class="btn-modal btn-modal--confirm" id="addModalConfirm">Add Token</button>
    </div>
  </div>
</div>

<!-- RESET CONFIRM MODAL -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3 class="modal-title">Start New Game?</h3>
    <p class="modal-body">This will reset all tokens and history.</p>
    <div class="modal-actions">
      <button class="btn-modal btn-modal--cancel" id="resetModalCancel">Cancel</button>
      <button class="btn-modal btn-modal--danger" id="resetModalConfirm">Reset Everything</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
